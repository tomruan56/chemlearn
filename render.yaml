services:
  - type: web
    name: chemlearn
    env: node
    region: singapore          # closest to Vietnam — change to frankfurt/oregon if preferred
    plan: free
    buildCommand: npm install && npm run build && npm run install:server
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true    # Render auto-generates a secure random value
