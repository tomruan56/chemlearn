services:
  - type: web
    name: chemlearn
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && cd client && npm install --include=dev && npm run build && cd ../server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
